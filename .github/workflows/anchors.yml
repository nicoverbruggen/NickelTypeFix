name: Anchors

# Validates the in-memory byte-patch anchors (justification + letter-spacing) against
# every tracked Kobo firmware at the mod's version floor, the way syms validates
# //libnickel symbols. Runs on pushes to main (not tags) so you can push, confirm it's
# green, then tag a release.

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  anchors:
    name: byte-patch anchors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache firmware libs
        uses: actions/cache@v4
        with:
          # Key on the tracked firmware list. When it changes (a build added via
          # mkfwlist.go) the key changes; restore-keys pulls the previous corpus so
          # only the new libs download.
          path: test/anchors/corpus
          key: qt-corpus-v2-${{ hashFiles('test/anchors/firmwares.tsv') }}
          restore-keys: qt-corpus-v2-

      - name: Validate anchors
        working-directory: test/anchors
        run: go run .
