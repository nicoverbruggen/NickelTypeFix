name: Build

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: NickelTypeFix
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pgaskin/nickeltc:1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Build
        run: make clean all strip koboroot

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: NickelTypeFix
          path: |
            KoboRoot.tgz
            src/libnickeltypefix.so

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: NickelTypeFix

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: NickelTypeFix ${{ github.ref_name }}
          body: |
            Install by copying `KoboRoot.tgz` to the Kobo's `.kobo` folder, ejecting the device, and rebooting.
          files: KoboRoot.tgz
